name: CI/CD Pipeline

on:
    push:
        branches:
            - main
        tags:
            - '*'
    workflow_dispatch:

jobs:
    build:
        name: Build .NET Project
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup .NET SDK
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '8.0.x'

            - name: Restore dependencies
              run: dotnet restore

            - name: Build project
              run: dotnet build --no-restore -c Release

            - name: Publish project
              run: |
                  dotnet restore
                  dotnet build --configuration Release
                  dotnet test --configuration Release --logger "junit;LogFileName=tests/TestResults/test_results.xml"

            - name: Upload publish artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dotnet-publish
                  path: ./publish

    test:
        name: Run Tests
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup .NET SDK
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '8.0.x'

            - name: Restore dependencies
              run: dotnet restore

            - name: Run tests
              run: dotnet test --no-restore -c Release